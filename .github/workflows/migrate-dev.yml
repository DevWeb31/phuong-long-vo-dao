name: Run Development Migrations

on:
  push:
    branches: [ develop, feature/* ]
  pull_request:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  migrate-dev:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run database migrations (Development)
      run: npm run db:migrate:dev
      env:
        VITE_APP_ENV: development
        VITE_SUPABASE_URL_DEV: ${{ secrets.VITE_SUPABASE_URL_DEV }}
        VITE_SUPABASE_SERVICE_ROLE_KEY_DEV: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY_DEV }}
        
    - name: Test application
      run: npm run build
      env:
        VITE_APP_ENV: development
