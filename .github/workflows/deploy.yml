name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
      env:
        VITE_APP_ENV: production
        
    - name: Run database migrations (Production)
      run: npm run db:migrate:prod
      env:
        VITE_APP_ENV: production
        VITE_SUPABASE_URL_PROD: ${{ secrets.VITE_SUPABASE_URL_PROD }}
        VITE_SUPABASE_SERVICE_ROLE_KEY_PROD: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY_PROD }}
        
    - name: Run database seeders (Production)
      run: npm run db:seed:prod
      env:
        VITE_APP_ENV: production
        VITE_SUPABASE_URL_PROD: ${{ secrets.VITE_SUPABASE_URL_PROD }}
        VITE_SUPABASE_SERVICE_ROLE_KEY_PROD: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY_PROD }}
        
    # Ajoutez ici les étapes de déploiement vers votre hébergeur
    # Par exemple, déploiement vers Vercel, Netlify, etc.
    
    - name: Deploy to hosting platform
      run: echo "Ajoutez ici votre commande de déploiement"
